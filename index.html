<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargate Chronicles Interface</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/sgc-theme.css">
    <link rel="stylesheet" href="./src/styles/animations.css">
</head>

<body>
    <div id="app" class="sgc-container">
        <header class="header panel">
            <h1>STARGATE: CHRONICLES - v1.0.0</h1>
            <div id="clock">14:55:00</div>
        </header>

        <aside class="left-panel panel">
            <h2>DESTINATIONS</h2>
            <div id="planet-list"></div>
        </aside>

        <section class="central-display panel">
            <div id="gate-display">
                <!-- Stargate Animation Placeholder -->
                <div class="gate-ring"></div>
            </div>
            <div id="coordinates-input"></div>
        </section>

        <aside class="right-panel panel">
            <h2>PLANET INFO</h2>
            <div id="planet-info">Sélectionnez une destination.</div>
        </aside>

        <footer class="bottom-panel panel">
            <h2>MISSION LOGS</h2>
            <div id="mission-logs">SGC Online. Prêt pour l'opération.</div>
        </footer>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
