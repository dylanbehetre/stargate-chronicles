<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargate Chronicles - Command Interface</title>
    <!-- We only need main.css as it imports theme-anime.css -->
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/animations.css">
    <!-- Google Fonts for Anime aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="screen-container">
            <header class="header glass-panel glow-border-cyan" style="grid-column: 1 / span 3; grid-row: 1; flex-direction: row; justify-content: space-between; align-items: center; padding: 0 20px;">
                <h1>STARGATE COMMAND - HQ</h1>
                <div id="clock" style="font-size: 1.5rem; color: var(--color-cyan); font-family: monospace;">00:00:00</div>
            </header>

            <aside id="left-column" class="glass-panel" style="grid-row: 2; grid-column: 1;">
                <h2 style="color: var(--color-cyan); margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(0, 255, 242, 0.2); padding-bottom: 10px;">DESTINATIONS</h2>
                <div id="planet-list" style="flex: 1; overflow-y: auto;"></div>
            </aside>

            <main id="center-column" class="glass-panel" style="grid-row: 2; grid-column: 2; padding: 0;">
                <div class="tabs-header" style="display: flex; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(0, 255, 242, 0.2);">
                    <button class="tab-btn active" data-target="gate-display" style="flex: 1; border: none; border-bottom: 2px solid var(--color-cyan);">SALLE DE LA PORTE</button>
                    <button class="tab-btn" data-target="coordinates-input" style="flex: 1; border: none;">COMPOSITION MANUELLE</button>
                </div>

                <div id="gate-display" class="tab-content active" style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #0a192f, #000);">
                    <div class="gate-ring">
                        <div class="gate-inner-ring"></div>
                        <div class="chevron-container">
                            <!-- 9 Chevrons -->
                            <div class="chevron" style="transform: rotate(0deg);"></div>
                            <div class="chevron" style="transform: rotate(40deg);"></div>
                            <div class="chevron" style="transform: rotate(80deg);"></div>
                            <div class="chevron" style="transform: rotate(120deg);"></div>
                            <div class="chevron" style="transform: rotate(160deg);"></div>
                            <div class="chevron" style="transform: rotate(200deg);"></div>
                            <div class="chevron" style="transform: rotate(240deg);"></div>
                            <div class="chevron" style="transform: rotate(280deg);"></div>
                            <div class="chevron" style="transform: rotate(320deg);"></div>
                        </div>
                        <div class="vortex"></div>
                    </div>
                </div>

                <div id="coordinates-input" class="tab-content" style="display: none; padding: 20px; flex: 1; overflow-y: auto;"></div>
            </main>


            <aside id="right-column" class="glass-panel" style="grid-row: 2; grid-column: 3;">
                <h2 style="color: var(--color-cyan); margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(0, 255, 242, 0.2); padding-bottom: 10px;">PLANET MONITOR</h2>
                <div id="planet-info" style="flex: 1; overflow-y: auto;">Sélectionnez une destination pour commencer le scan...</div>
            </aside>

            <footer id="bottom-panel" class="glass-panel" style="grid-column: 1 / span 3; grid-row: 3;">
                <h2 style="color: var(--color-amber); font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase;">MISSION LOGS</h2>
                <div id="mission-logs" style="flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: rgba(255,255,255,0.8);"></div>
            </footer>

        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
